<section class="panel" id="case-study">
      <div class="panel-head reveal">
        <h2>CASE STUDY</h2>
        <p>Eine Vorher/Nachher-Ansicht aus einem Redesign.</p>
      </div>
      <div class="compare reveal" data-compare>
        <div class="compare-toolbar">
          <div>
            <strong>RV Hard</strong>
            <p>Content-Struktur, Lesbarkeit und visuelle Ruhe im Vergleich.</p>
          </div>
          <div class="segmented" role="tablist" aria-label="Case Study Bilder">
            <button class="seg-btn active" type="button" data-compare-btn="news" aria-pressed="true">
              <img class="seg-thumb" src="assets/rvhard-news-after.jpeg" alt="news small">
              <span>NEWS</span>
            </button>
            <button class="seg-btn" type="button" data-compare-btn="events" aria-pressed="false">
              <img class="seg-thumb" src="assets/rvhard-events-after.jpeg" alt="events small">
              <span>EVENTS</span>
            </button>
            <button class="seg-btn" type="button" data-compare-btn="main" aria-pressed="false">
              <img class="seg-thumb" src="assets/rvhard-after.jpeg" alt="main small">
              <span>MAIN</span>
            </button>
          </div>
        </div>
        <div class="compare-stage-wrap">
          <figure class="compare-stage" data-compare-stage>
            <img class="compare-before" data-compare-before src="assets/rvhard-news-before.jpeg" alt="RV Hard News vor dem Redesign">
            <img class="compare-after" data-compare-after src="assets/rvhard-news-after.jpeg" alt="RV Hard News nach dem Redesign">
            <div class="compare-handle" aria-hidden="true"></div>
          </figure>
          <label class="compare-range-label">
            <span>Vorher / Nachher</span>
            <input class="compare-range" type="range" min="0" max="100" value="50" data-compare-range aria-label="Vorher und Nachher vergleichen">
          </label>
        </div>
      </div>
      
    </section>
