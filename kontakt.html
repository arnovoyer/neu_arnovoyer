<!DOCTYPE html>
<html lang="de-AT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kontaktseite von Arno Voyer.">
    <title>Kontakt | Arno Voyer</title>
    <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
    <style>
        :root {
            --accent: #00f5d4;
            --bg: #050505;
            --card: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.14);
            --soft: rgba(255, 255, 255, 0.72);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
            color: #fff;
            background: radial-gradient(circle at 15% 10%, #131313, #050505 56%);
            padding: 26px 16px 110px;
        }

        .noise {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: .03;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
        }

        .terminal {
            width: min(760px, 100%);
            margin: 0 auto;
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            background: var(--card);
            backdrop-filter: blur(8px);
            position: relative;
            z-index: 1;
            box-shadow: 0 14px 32px rgba(0, 0, 0, 0.26);
        }

        .terminal-bar {
            height: 46px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }

        .bar-title {
            margin-left: auto;
            color: var(--soft);
            font-size: 12px;
        }

        .terminal-body {
            padding: 18px;
            display: grid;
            gap: 14px;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.5rem, 4vw, 2.2rem);
        }

        p {
            margin: 0;
            color: var(--soft);
            line-height: 1.65;
            font-size: 14px;
        }

        .line { color: var(--accent); }

        .terminal-form {
            display: grid;
            gap: 14px;
            margin-top: 2px;
        }

        .terminal-form label span {
            display: block;
            margin-bottom: 4px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
        }

        .terminal-form input,
        .terminal-form textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.24);
            padding: 7px 0;
            color: #fff;
            outline: none;
            font: inherit;
        }

        .terminal-form button {
            width: fit-content;
            border: 1px solid rgba(0, 245, 212, 0.5);
            border-radius: 9px;
            background: rgba(0, 245, 212, 0.1);
            color: #fff;
            font: inherit;
            cursor: pointer;
            padding: 8px 14px;
        }

        .terminal-form button:hover {
            background: rgba(0, 245, 212, 0.18);
            color: var(--accent);
        }

        .legal {
            width: min(760px, 100%);
            margin: 14px auto 0;
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            color: rgba(255, 255, 255, .55);
            font-size: 12px;
            position: relative;
            z-index: 1;
        }

        .legal a {
            color: inherit;
            text-decoration: none;
        }

        .task-dock {
            position: fixed;
            left: 50%;
            bottom: 20px;
            transform: translateX(-50%);
            z-index: 9999;
        }

        .task-dock-shell {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            border-radius: 18px;
            background: linear-gradient(150deg, rgba(26, 26, 26, .86), rgba(10, 10, 10, .92));
            border: 1px solid rgba(255, 255, 255, .16);
            backdrop-filter: blur(10px) saturate(130%);
        }

        .dock-start,
        .dock-item {
            height: 48px;
            min-width: 48px;
            border: 1px solid rgba(255, 255, 255, .18);
            background: rgba(255, 255, 255, .06);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0 12px;
            text-decoration: none;
            color: #fff;
            position: relative;
        }

        .dock-start {
            width: 48px;
            min-width: 48px;
            padding: 0;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(0, 245, 212, .95), rgba(0, 245, 212, .65));
            border-color: rgba(0, 245, 212, .7);
        }

        .dock-start img { width: 24px; height: 24px; object-fit: contain; }

        .dock-item.active::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: 4px;
            width: 6px;
            height: 6px;
            border-radius: 999px;
            transform: translateX(-50%);
            background: var(--accent);
            box-shadow: 0 0 12px rgba(0, 245, 212, .8);
        }

        .dock-label { font-size: 12px; }

        .dock-sep {
            width: 1px;
            height: 30px;
            background: rgba(255, 255, 255, .18);
        }

        @media (max-width: 860px) {
            .task-dock { width: min(560px, calc(100% - 24px)); }
            .task-dock-shell { justify-content: space-between; width: 100%; padding: 8px; border-radius: 14px; }
            .dock-item { flex: 1; min-width: 0; padding: 0 8px; }
            .dock-label { display: none; }
            .dock-sep { display: none; }
        }
    </style>
</head>

<body>
    <div class="noise" aria-hidden="true"></div>

    <main class="terminal" aria-label="Kontakt Fenster">
        <div class="terminal-bar">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
            <span class="bar-title">contact -- arnovoyer.com</span>
        </div>

        <div class="terminal-body">
            <h1>Kontakt</h1>
            <p>Wenn du ein Projekt besprechen willst oder eine Frage hast, schreib mir direkt ueber das Formular.</p>
            <p class="line">&gt; response usually within 24-48h</p>

            <form class="terminal-form" action="https://formsubmit.co/960b84b77c6a19818c6173d5ef6ff2a6" method="POST">
                <input type="hidden" name="_subject" value="Neue Nachricht ueber arnovoyer.com/kontakt" />
                <input type="hidden" name="_captcha" value="false" />
                <input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off" />

                <label>
                    <span>&gt; name</span>
                    <input type="text" name="name" required>
                </label>

                <label>
                    <span>&gt; email</span>
                    <input type="email" name="email" required>
                </label>

                <label>
                    <span>&gt; nachricht</span>
                    <textarea name="message" rows="4" required></textarea>
                </label>

                <button type="submit">&gt; senden</button>
            </form>
        </div>
    </main>

    <div class="legal" aria-label="Weiterfuehrende Seiten">
        <a href="/ueber-mich.html">Ueber mich</a>
        <a href="/impressum.html">Impressum</a>
        <a href="/datenschutz.html">Datenschutz</a>
    </div>

    <nav class="task-dock" aria-label="Schnellnavigation">
        <div class="task-dock-shell">
            <a href="/index.html" class="dock-start" aria-label="Zur Startseite"><img src="/assets/logo.svg" alt="Logo"></a>
            <span class="dock-sep" aria-hidden="true"></span>

            <a href="/index.html" class="dock-item" aria-label="Home"><span class="dock-label">Home</span></a>
            <a href="/blog.php" class="dock-item" aria-label="Blog"><span class="dock-label">Blog</span></a>
            <a href="/projects.html" class="dock-item" aria-label="Projekte"><span class="dock-label">Projekte</span></a>
            <a href="/ueber-mich.html" class="dock-item" aria-label="Ueber mich"><span class="dock-label">Ueber</span></a>
            <a href="/kontakt.html" class="dock-item active" aria-label="Kontakt" aria-current="page"><span class="dock-label">Kontakt</span></a>
        </div>
    </nav>
</body>

</html>
