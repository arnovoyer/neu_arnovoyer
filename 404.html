<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>404 — Seite nicht gefunden</title>
  <link rel="stylesheet" href="assets/style.css">
  <meta name="theme-color" content="#070b12">
  <style>
    .error-page{min-height:100vh;display:grid;place-items:center;padding:40px;text-align:center}
    .error-card{max-width:820px;padding:36px;border-radius:14px;background:linear-gradient(180deg, rgba(8,12,18,0.9), rgba(10,14,20,0.92));box-shadow:0 24px 48px rgba(0,0,0,0.5)}
    .error-h{font-size:clamp(2.4rem,6vw,4rem);margin:0 0 12px}
    .error-sub{color:var(--muted);margin-bottom:22px}
  </style>
</head>
<body>
  <main class="error-page">
    <div class="error-card">
      <h1 class="error-h">404 — Seite nicht gefunden</h1>
      <p class="error-sub">Die angeforderte Seite existiert nicht oder wurde entfernt.</p>
      <p>
        <a class="btn primary" href="index.html">Zurück zur Startseite</a>
      </p>
    </div>
  </main>
  <script src="assets/main.js"></script>
</body>
</html>
