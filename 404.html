<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>404 | Seite nicht gefunden | Arno Voyer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="404-Fehlerseite von arnovoyer.com.">
  <meta name="robots" content="noindex, follow, noarchive">
  <link rel="stylesheet" href="/assets/context-menu.css">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: '#00f5d4'
          }
        }
      }
    }
  </script>

  <style>
    body {
      background: #050505;
    }

    .noise {
      position: fixed;
      inset: 0;
      background-image: url("https://grainy-gradients.vercel.app/noise.svg");
      opacity: .04;
      pointer-events: none;
    }

    .dialog {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      backdrop-filter: blur(10px);
      width: 100%;
      max-width: 420px;
    }

    .dialog-bar {
      height: 42px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      background: rgba(255,255,255,0.06);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .dot.red { background: #ff5f56; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green { background: #27c93f; }

    .log {
      font-family: monospace;
      font-size: 13px;
      color: #00f5d4;
      margin-top: 14px;
      white-space: pre-line;
    }
    
    .task-dock {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translate(-50%, 120%);
      opacity: 0;
      pointer-events: none;
      z-index: 10000;
      transition: transform .35s ease, opacity .25s ease;
    }

    .task-dock.visible {
      transform: translate(-50%, 0);
      opacity: 1;
      pointer-events: auto;
    }

    .task-dock-shell {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border-radius: 18px;
      background: linear-gradient(150deg, rgba(26, 26, 26, 0.86), rgba(10, 10, 10, 0.92));
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(10px) saturate(130%);
    }

    .dock-start,
    .dock-item {
      height: 48px;
      min-width: 48px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 12px;
      cursor: pointer;
      transition: transform .2s ease, background .2s ease, border-color .2s ease;
      text-decoration: none;
      white-space: nowrap;
      position: relative;
    }

    .dock-start {
      width: 48px;
      min-width: 48px;
      padding: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(0, 245, 212, 0.95), rgba(0, 245, 212, 0.65));
      border-color: rgba(0, 245, 212, 0.7);
    }

    .dock-start img {
      width: 24px;
      height: 24px;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.35));
      pointer-events: none;
    }

    .dock-item:hover,
    .dock-item:focus-visible,
    .dock-start:hover,
    .dock-start:focus-visible {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(0, 245, 212, 0.5);
      outline: none;
    }

    .dock-item.active::after {
      content: '';
      position: absolute;
      left: 50%;
      bottom: 4px;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      transform: translateX(-50%);
      background: #00f5d4;
      box-shadow: 0 0 12px rgba(0, 245, 212, 0.8);
    }

    .dock-icon {
      font-size: 1.1rem;
      line-height: 1;
    }

    .dock-label {
      font-size: 0.82rem;
      letter-spacing: .01em;
      color: rgba(255, 255, 255, 0.95);
    }

    .dock-sep {
      width: 1px;
      height: 30px;
      background: rgba(255, 255, 255, 0.18);
      margin: 0 2px;
    }

    @media (max-width: 860px) {
      .task-dock {
        left: 50%;
        right: auto;
        width: min(560px, calc(100% - 24px));
        transform: translate(-50%, 120%);
      }

      .task-dock.visible {
        transform: translate(-50%, 0);
      }

      .task-dock-shell {
        justify-content: space-between;
        width: 100%;
        padding: 8px;
        border-radius: 14px;
      }

      .dock-item {
        flex: 1;
        min-width: 0;
        padding: 0 8px;
      }

      .dock-label {
        display: none;
      }

      .dock-sep {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .task-dock {
        transition: none;
      }

      .dock-start,
      .dock-item {
        transition: none;
      }
    }
  </style>
</head>

<body class="text-white min-h-screen flex items-center justify-center px-6">

  <div class="noise"></div>

  <div class="dialog relative z-10">
    <!-- BAR -->
    <div class="dialog-bar">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>

      <span class="ml-3 text-xs tracking-widest uppercase text-neutral-400">
        System Dialog
      </span>
    </div>

    <!-- CONTENT -->
    <div class="p-6">
      <h1 class="text-lg font-medium mb-2">
        Seite nicht gefunden
      </h1>

      <p class="text-sm text-neutral-400 leading-relaxed">
        Die gesuchte Seite existiert nicht.<br>
        Sie wurde möglicherweise entfernt oder nie erstellt.
      </p>

      <div class="flex justify-end gap-3 mt-6">
        <button onclick="goHome()"
          class="px-4 py-2 text-sm rounded-md bg-white/5 hover:bg-white/10 transition">
          Abbrechen
        </button>

        <button onclick="deletePage()"
          class="px-4 py-2 text-sm rounded-md
                 bg-accent/10 text-accent
                 hover:bg-accent/20 transition">
          Seite löschen
        </button>
      </div>

      <div id="log" class="log hidden"></div>
    </div>
  </div>

  <nav class="task-dock" id="task-dock" aria-label="Schnellnavigation">
    <div class="task-dock-shell">
      <a href="/index.html" class="dock-start" aria-label="Zur Startseite"><img src="/assets/logo.svg" alt="Logo"></a>
      <span class="dock-sep" aria-hidden="true"></span>

      <a href="/index.html" class="dock-item" data-target="home" aria-label="Home">
        <span class="dock-icon" aria-hidden="true">◎</span>
        <span class="dock-label">Home</span>
      </a>

      <a href="/blog.php" class="dock-item" data-target="blog" aria-label="Blog">
        <span class="dock-icon" aria-hidden="true">✎</span>
        <span class="dock-label">Blog</span>
      </a>

      <a href="/projects.html" class="dock-item" data-target="projects" aria-label="Projekte">
        <span class="dock-icon" aria-hidden="true">⌘</span>
        <span class="dock-label">Projekte</span>
      </a>

      <a href="/index.html#contact" class="dock-item" data-target="contact" aria-label="Kontakt">
        <span class="dock-icon" aria-hidden="true">⌁</span>
        <span class="dock-label">Kontakt</span>
      </a>
    </div>
  </nav>

      <!-- CONTEXT MENU -->
    <div id="context-menu" class="context-menu">
        <div class="context-menu-item" data-action="home">
            <span class="context-menu-icon">⚡</span>
            <span>~/root</span>
        </div>
        <div class="context-menu-item" data-action="about">
            <span class="context-menu-icon">👤</span>
            <span>whoami</span>
        </div>
        <div class="context-menu-item" data-action="projects" id="context-projects">
            <span class="context-menu-icon">📂</span>
            <span>./repositories</span>
        </div>

        <div class="context-menu-item divider"></div>

        <div class="context-menu-item" data-action="contact">
            <span class="context-menu-icon">📡</span>
            <span>ping --remote</span>
        </div>
        <div class="context-menu-item" data-action="tech">
            <span class="context-menu-icon">🛠️</span>
            <span>view --stack</span>
        </div>

        <div class="context-menu-item divider"></div>

        <div class="context-menu-item" data-action="refresh">
            <span class="context-menu-icon">⚠️</span>
            <span>systemctl reboot</span>
        </div>
    </div>
  <script>
    const log = document.getElementById("log")

    function deletePage() {
      log.classList.remove("hidden")
      log.textContent = "> seite löschen..."

      setTimeout(() => {
        log.textContent += "\n> fehler: seite nicht gefunden"
      }, 900)

      setTimeout(() => {
        log.textContent += "\n> weiterleitung zur startseite"
      }, 1600)

      setTimeout(() => {
        window.location.href = "/"
      }, 2600)
    }

    function goHome() {
      window.location.href = "/"
    }
    
    const taskDock = document.getElementById('task-dock')

    function updateTaskDockVisibility() {
      if (!taskDock) return
      const maxScroll = Math.max(document.documentElement.scrollHeight - window.innerHeight, 0)
      taskDock.classList.toggle('visible', maxScroll <= 24 || window.scrollY > 40)
    }

    window.addEventListener('scroll', updateTaskDockVisibility, { passive: true })
    setTimeout(updateTaskDockVisibility, 300)
  </script>
  <script src="/assets/context-menu.js"></script>

</body>
</html>
