<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>401 — Zugriff verweigert</title>
  <link rel="stylesheet" href="assets/style.css">
  <meta name="theme-color" content="#070b12">
  <style>
    .error-page{min-height:100vh;display:grid;place-items:center;padding:clamp(30px,5vw,60px);text-align:center}
    .error-card{max-width:720px;padding:clamp(40px,6vw,64px);border-radius:18px;border:1px solid rgba(152,176,255,0.08);background:linear-gradient(160deg, rgba(8,13,24,0.92), rgba(12,18,32,0.96));box-shadow:0 32px 64px rgba(0,0,0,0.4),0 0 1px rgba(152,176,255,0.1) inset}
    .error-h{font-size:clamp(2.2rem,5.5vw,3.8rem);margin:0 0 16px;font-weight:900;letter-spacing:-0.01em}
    .error-sub{color:var(--muted);margin-bottom:32px;font-size:1.05rem;line-height:1.6}
    .error-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  </style>
</head>
<body>
  <main class="error-page">
    <div class="error-card">
      <h1 class="error-h">401</h1>
      <p class="error-sub">Diese Seite erfordert eine Berechtigung. Kontaktiere den Administrator für Zugang.</p>
      <div class="error-actions" style="margin-top:28px">
        <a class="btn primary" href="index.html#contact">Kontakt</a>
        <a class="btn" href="index.html">Zurück zur Startseite</a>
      </div>
    </div>
  </main>
  <script src="assets/main.js"></script>
</body>
</html>
